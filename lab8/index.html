<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Лабораторна робота №8</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav class="navbar">
      <button class="hamburger">☰</button>
      <ul class="nav-menu">
        <li><a href="#">Головна 🏠</a></li>
        <li><a href="#">Послуги ⚙️</a></li>
        <li><a href="#">Контакти 📞</a></li>
      </ul>
    </nav>

    <div class="carousel-container">
      <div class="carousel-slides">
        <img
          src="https://placehold.co/800x400/FF5733/FFF?text=Slide+1"
          class="slide"
          alt="Slide 1"
        />
        <img
          src="https://placehold.co/800x400/33FF57/FFF?text=Slide+2"
          class="slide"
          alt="Slide 2"
        />
        <img
          src="https://placehold.co/800x400/3357FF/FFF?text=Slide+3"
          class="slide"
          alt="Slide 3"
        />
      </div>
      <button class="prev">❮</button>
      <button class="next">❯</button>
      <div class="indicators">
        <span class="indicator active"></span>
        <span class="indicator"></span>
        <span class="indicator"></span>
      </div>
    </div>

    <div class="device-images">
      <div class="large-only">
        <img
          src="https://placehold.co/300x200?text=Large+1"
          alt="Large Only 1"
        />
        <img
          src="https://placehold.co/300x200?text=Large+2"
          alt="Large Only 2"
        />
      </div>
      <div class="medium-only">
        <img
          src="https://placehold.co/300x200?text=Medium+1"
          alt="Medium Only 1"
        />
        <img
          src="https://placehold.co/300x200?text=Medium+2"
          alt="Medium Only 2"
        />
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
