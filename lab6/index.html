<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lab6</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Game: Lights Out</h1>

    <div class="controls">
      <label for="levelSelect">Choose level:</label>
      <select id="levelSelect">
        <option value="0">Level A</option>
        <option value="1">Level B</option>
        <option value="2">Level C</option>
      </select>
      <button id="loadBtn">Load level</button>
    </div>

    <div class="stats" id="statsArea" style="display: none">
      <p>Time: <span id="timeDisplay">0</span> sec</p>
      <p>Score: <span id="movesDisplay">0</span></p>
      <p>Target: <span id="minMovesDisplay">0</span></p>
    </div>

    <div id="gameBoard" style="display: none"></div>

    <script src="script.js"></script>
  </body>
</html>
